server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/html text/css application/javascript;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(html|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
